<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crown Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #f0f2f5;
            --sidebar-bg: #ffffff;
            --main-bg: #ffffff;
            --messages-bg: #f0f2f5;
            --border: #e0e3e8;
            --text: #1a1c1e;
            --text-light: #656d76;
            --text-secondary: #8b949e;
            --msg-other-bg: #ffffff;
            --msg-other-border: #e0e3e8;
            --input-bg: #f6f8fa;
            --hover: #f3f4f6;
            --active: #e8f0fe;
            --blue: #1a73e8;
            --blue-dark: #1557b0;
            --blue-light: #e8f0fe;
            --green: #43a76b;
            --green-dark: #388f5a;
            --header-bg: #1a73e8;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
            --radius: 12px;
            --radius-lg: 16px;
            --radius-sm: 10px;
            --chat-bg-color: #f0f2f5;
            --chat-bg-image: none;
            --mention-color: #1a73e8;
            --mention-bg: #e8f0fe;
            --reaction-bg: #f3f4f6;
            --reaction-active-bg: #dbeafe;
            --reaction-active-text: #1a73e8;
        }
        
        body.dark {
            --bg: #0d1117;
            --sidebar-bg: #161b22;
            --main-bg: #161b22;
            --messages-bg: #0d1117;
            --border: #30363d;
            --text: #e6edf3;
            --text-light: #8b949e;
            --text-secondary: #6e7681;
            --msg-other-bg: #21262d;
            --msg-other-border: #30363d;
            --input-bg: #21262d;
            --hover: #21262d;
            --active: #1a2340;
            --blue: #58a6ff;
            --blue-dark: #1f6feb;
            --blue-light: #1a2340;
            --green: #3fb950;
            --green-dark: #2ea043;
            --header-bg: #1a2340;
            --shadow: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.5);
            --chat-bg-color: #0d1117;
            --chat-bg-image: none;
            --mention-color: #58a6ff;
            --mention-bg: #1a2340;
            --reaction-bg: #21262d;
            --reaction-active-bg: #1a2340;
            --reaction-active-text: #58a6ff;
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }
        
        .app-container { width: 100%; height: 100vh; display: flex; background: var(--main-bg); position: relative; overflow: hidden; }
        
        .sidebar { width: 340px; min-width: 340px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; z-index: 20; }
        
        .sidebar-top { padding: 10px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
        .sidebar-top .hamburger-btn { background: none; border: none; color: var(--text); font-size: 18px; cursor: pointer; padding: 8px; border-radius: 8px; display: flex; flex-direction: column; gap: 3px; transition: background 0.15s; min-width: 44px; min-height: 44px; align-items: center; justify-content: center; }
        .sidebar-top .hamburger-btn:hover { background: var(--hover); }
        .hamburger-line { width: 18px; height: 2px; background: var(--text); border-radius: 2px; }
        .sidebar-top .search-box { flex: 1; position: relative; }
        .sidebar-top .search-box input { width: 100%; padding: 10px 14px 10px 36px; border: 2px solid var(--border); border-radius: 22px; font-size: 13px; outline: none; background: var(--input-bg); color: var(--text); transition: border-color 0.2s; }
        .sidebar-top .search-box input:focus { border-color: var(--blue); }
        .sidebar-top .search-box .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-light); pointer-events: none; }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--main-bg); border: 1px solid var(--border); border-radius: var(--radius); max-height: 200px; overflow-y: auto; z-index: 50; display: none; box-shadow: var(--shadow-lg); margin-top: 4px; }
        .search-results.show { display: block; }
        .search-result-item { padding: 10px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text); transition: background 0.15s; } .search-result-item:hover { background: var(--hover); }
        
        .chat-list { flex: 1; overflow-y: auto; padding: 4px 6px; }
        .chat-item { padding: 10px 12px; margin: 2px 0; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.15s; position: relative; }
        .chat-item:hover { background: var(--hover); }
        .chat-item.active { background: var(--active); }
        .chat-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .chat-avatar-placeholder { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-info-top { display: flex; justify-content: space-between; align-items: baseline; }
        .chat-name { font-weight: 600; font-size: 14px; color: var(--text); }
        .chat-name.unread { font-weight: 700; }
        .chat-time { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; margin-left: 6px; }
        .chat-last-msg { font-size: 12px; color: var(--text-light); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-badge { background: var(--blue); color: white; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); }
        
        .main-area { flex: 1; display: flex; flex-direction: column; height: 100vh; background: var(--main-bg); min-width: 0; }
        .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; cursor: pointer; background: var(--main-bg); position: relative; }
        .back-btn { display: none; background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 8px; border-radius: 8px; min-width: 44px; min-height: 44px; align-items: center; justify-content: center; }
        .chat-header-avatar-placeholder { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
        .chat-header-info h3 { font-size: 15px; font-weight: 600; color: var(--text); } .chat-header-info span { font-size: 11px; color: var(--text-light); }
        .chat-menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 8px; border-radius: 8px; margin-left: auto; min-width: 44px; min-height: 44px; align-items: center; justify-content: center; z-index: 5; }
        .chat-menu-btn:hover { background: var(--hover); }
        .chat-menu-dropdown { display: none; position: absolute; top: 100%; right: 10px; background: var(--main-bg); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); z-index: 100; min-width: 200px; padding: 4px 0; }
        .chat-menu-dropdown.show { display: block; }
        .chat-menu-item { padding: 10px 16px; cursor: pointer; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 10px; border: none; background: none; width: 100%; text-align: left; transition: background 0.15s; }
        .chat-menu-item:hover { background: var(--hover); }
        .chat-menu-item.danger { color: #dc2626; }
        
        .msg-search-bar { display: none; padding: 8px 14px; background: var(--main-bg); border-bottom: 1px solid var(--border); align-items: center; gap: 8px; } .msg-search-bar.show { display: flex; }
        .msg-search-bar input { flex: 1; padding: 8px 12px; border: 2px solid var(--border); border-radius: 18px; font-size: 13px; outline: none; background: var(--input-bg); color: var(--text); }
        .msg-search-bar .search-nav button { background: var(--hover); border: none; cursor: pointer; padding: 8px 10px; border-radius: 50%; font-size: 13px; color: var(--text); min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; } .msg-search-bar .search-nav button:hover { background: var(--border); }
        .msg-search-count { font-size: 11px; color: var(--text-light); } .msg-highlight { background: rgba(255,200,0,0.35); border-radius: 3px; }
        
        .pinned-bar { display: none; padding: 8px 14px; background: var(--blue-light); border-bottom: 1px solid var(--border); align-items: center; gap: 10px; font-size: 12px; cursor: pointer; color: var(--blue); } .pinned-bar.show { display: flex; }
        .scroll-bottom-btn { display: none; position: absolute; bottom: 80px; right: 16px; width: 44px; height: 44px; border-radius: 50%; background: var(--main-bg); color: var(--text); border: 1px solid var(--border); cursor: pointer; font-size: 16px; z-index: 10; box-shadow: var(--shadow); animation: bounceIn 0.3s ease; } .scroll-bottom-btn.show { display: flex; align-items: center; justify-content: center; }
        @keyframes bounceIn { 0%{transform:scale(0)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 12px 16px; background-color: var(--chat-bg-color); background-image: var(--chat-bg-image); background-size: cover; background-position: center; display: flex; flex-direction: column; gap: 3px; -webkit-overflow-scrolling: touch; position: relative; }
        .date-divider { text-align: center; padding: 10px 0; font-size: 12px; color: var(--text-secondary); font-weight: 500; }
        .message { display: flex; gap: 8px; max-width: 68%; animation: messageIn 0.2s ease; align-items: flex-end; }
        @keyframes messageIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .message.mine { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        .message-avatar-placeholder { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; flex-shrink: 0; cursor: pointer; }
        .message-bubble { padding: 7px 12px; border-radius: var(--radius-sm); font-size: 14px; line-height: 1.4; word-break: break-word; max-width: 100%; overflow: hidden; position: relative; }
        .message-bubble img, .message-bubble video { max-width: 100%; max-height: 320px; border-radius: 8px; cursor: pointer; display: block; }
        .message-bubble audio { max-width: 240px; display: block; }
        .message.other .message-bubble { background: var(--msg-other-bg); border: 1px solid var(--msg-other-border); border-bottom-left-radius: 4px; color: var(--text); }
        .message.mine .message-bubble { background: var(--green); color: white; border-bottom-right-radius: 4px; }
        .message-username { font-weight: 600; font-size: 11px; margin-bottom: 2px; opacity: 0.85; cursor: pointer; } .message.mine .message-username { color: rgba(255,255,255,0.9); }
        .message-time { font-size: 10px; opacity: 0.6; margin-top: 3px; } .message.mine .message-time { opacity: 0.8; }
        .message-read { font-size: 10px; margin-top: 2px; text-align: right; } .message.mine .message-read { color: rgba(255,255,255,0.7); }
        .message-edited { font-size: 10px; opacity: 0.6; } .message.mine .message-edited { opacity: 0.8; }
        .reply-preview { background: var(--hover); border-left: 2px solid var(--blue); padding: 4px 8px; border-radius: 4px; margin-bottom: 4px; font-size: 11px; cursor: pointer; color: var(--text); } .reply-preview b { color: var(--blue); }
        .reactions-bar { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; } .reaction-badge { background: var(--reaction-bg); padding: 3px 8px; border-radius: 10px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; } .reaction-badge:hover { background: var(--reaction-active-bg); }
        .reaction-badge.active { background: var(--reaction-active-bg); border-color: var(--blue); color: var(--reaction-active-text); }
        .reaction-picker { display: none; position: fixed; background: var(--main-bg); border: 1px solid var(--border); border-radius: 24px; padding: 6px 10px; box-shadow: var(--shadow-lg); z-index: 450; gap: 4px; } .reaction-picker.show { display: flex; } .reaction-emoji { font-size: 22px; cursor: pointer; padding: 6px; border-radius: 10px; transition: transform 0.15s; } .reaction-emoji:hover { transform: scale(1.3); background: var(--hover); }
        
        .typing-indicator { font-size: 12px; color: var(--text-light); padding: 4px 14px; display: flex; align-items: center; gap: 6px; } .typing-dots { display: flex; gap: 3px; } .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-light); animation: typingBounce 1.4s infinite; } .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
        @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
        
        .file-card { display: flex; align-items: center; gap: 10px; background: var(--hover); border-radius: 8px; padding: 8px 12px; margin-top: 4px; cursor: pointer; }
        .file-card-icon { font-size: 24px; }
        .file-card-info { flex: 1; min-width: 0; }
        .file-card-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-card-size { font-size: 10px; color: var(--text-light); }
        
        .gift-picker { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 600; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(2px); }
        .gift-picker.show { display: flex; }
        .gift-picker-content { background: var(--main-bg); border-radius: var(--radius-lg); padding: 24px; max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
        .gift-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
        .gift-item { background: var(--hover); border-radius: var(--radius); padding: 16px; text-align: center; cursor: pointer; transition: all 0.15s; border: 2px solid transparent; }
        .gift-item:hover { border-color: var(--blue); background: var(--active); }
        .gift-item .gift-emoji { font-size: 32px; }
        .gift-item .gift-name { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 6px; }
        .gift-item .gift-price { font-size: 11px; color: var(--text-light); margin-top: 2px; }
        
        .gifts-section { margin-top: 16px; }
        .gifts-section h3 { font-size: 14px; margin-bottom: 10px; color: var(--text); }
        .my-gift-card { display: flex; align-items: center; gap: 12px; background: var(--hover); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
        .my-gift-card .gift-emoji { font-size: 28px; }
        .my-gift-card .gift-info { flex: 1; }
        .my-gift-card .gift-name { font-size: 13px; font-weight: 600; color: var(--text); }
        .my-gift-card .gift-from { font-size: 11px; color: var(--text-light); }
        .my-gift-card .gift-comment { font-size: 12px; color: var(--text); margin-top: 4px; }
        .my-gift-card .btn-sell { background: var(--blue); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        
        .context-menu { display: none; position: fixed; background: var(--main-bg); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); z-index: 400; padding: 6px 0; min-width: 180px; } .context-menu.show { display: block; }
        .context-item { padding: 10px 16px; cursor: pointer; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 10px; border: none; background: none; width: 100%; text-align: left; transition: background 0.15s; } .context-item:hover { background: var(--hover); } .context-item.danger { color: #dc2626; }
        
        .input-area { padding: 10px 14px; padding-bottom: max(18px, env(safe-area-inset-bottom, 18px)); background: var(--main-bg); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
        .input-area input { flex: 1; padding: 11px 16px; border: 2px solid var(--border); border-radius: 20px; font-size: 14px; outline: none; background: var(--input-bg); color: var(--text); transition: border-color 0.2s; } .input-area input:focus { border-color: var(--blue); }
        .input-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--hover); border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: var(--text); transition: all 0.2s; } .input-btn:hover { background: var(--border); }
        .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--blue); color: white; border: none; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background 0.2s; } .send-btn:hover { background: var(--blue-dark); transform: scale(1.05); } .send-btn:active { transform: scale(0.95); }
        .voice-btn { background: var(--green); } .voice-btn:hover { background: var(--green-dark); }
        
        .emoji-panel { display: none; position: absolute; bottom: 70px; left: 14px; right: 14px; background: var(--main-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); z-index: 50; max-height: 280px; overflow-y: auto; padding: 10px; } .emoji-panel.show { display: block; }
        .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; } .emoji-item { font-size: 24px; cursor: pointer; padding: 8px; text-align: center; border-radius: 8px; transition: background 0.15s; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; } .emoji-item:hover { background: var(--hover); }
        .emoji-tabs { display: flex; gap: 4px; margin-bottom: 10px; } .emoji-tab { padding: 8px 14px; cursor: pointer; border-radius: 8px; font-size: 13px; border: none; background: none; color: var(--text-light); min-height: 44px; display: flex; align-items: center; } .emoji-tab.active { background: var(--blue); color: white; }
        .sticker-item, .gif-item { width: 70px; height: 70px; object-fit: contain; cursor: pointer; border-radius: 8px; transition: background 0.15s; } .sticker-item:hover, .gif-item:hover { background: var(--hover); }
        .mention-suggestions { display: none; position: absolute; bottom: 100%; left: 0; right: 0; background: var(--main-bg); border: 1px solid var(--border); border-radius: var(--radius); max-height: 160px; overflow-y: auto; z-index: 60; margin-bottom: 6px; box-shadow: var(--shadow); } .mention-suggestions.show { display: block; } .mention-item { padding: 10px 14px; cursor: pointer; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 10px; } .mention-item:hover { background: var(--hover); }
        .mention-highlight { color: var(--mention-color); font-weight: 600; background: var(--mention-bg); padding: 1px 4px; border-radius: 3px; }
        .reply-bar { display: none; padding: 8px 14px; background: var(--main-bg); border-top: 1px solid var(--border); align-items: center; gap: 10px; font-size: 13px; animation: slideUp 0.2s ease; } .reply-bar.show { display: flex; }
        @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        
        .lightbox { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 500; justify-content: center; align-items: center; } .lightbox.show { display: flex; }
        .lightbox img, .lightbox video { max-width: 95%; max-height: 95%; border-radius: 12px; } .lightbox-close { position: absolute; top: 16px; right: 16px; font-size: 30px; color: white; cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 50%; }
        
        .overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 15; } .overlay.show { display: block; }
        
        .menu-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 300; backdrop-filter: blur(4px); } .menu-overlay.show { display: flex; justify-content: center; align-items: center; padding: 20px; }
        .menu-panel { background: var(--main-bg); border-radius: var(--radius-lg); width: 100%; max-width: 320px; overflow: hidden; box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease; }
        .menu-profile { padding: 24px 20px; text-align: center; background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; }
        .menu-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.3); display: block; margin: 0 auto 10px; }
        .menu-avatar-placeholder { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; margin: 0 auto 10px; }
        .menu-nickname { font-size: 17px; font-weight: 700; } .menu-username { font-size: 13px; opacity: 0.8; margin-top: 2px; }
        .menu-items { padding: 8px 0; } .menu-item { padding: 12px 20px; cursor: pointer; font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 12px; border: none; background: none; width: 100%; text-align: left; transition: background 0.15s; } .menu-item:hover { background: var(--hover); }
        .menu-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
        .menu-footer { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; color: var(--text-light); font-size: 12px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(2px); } .modal.show { display: flex; }

<script>
var username="",nickname="",myAvatar="",ws,currentChatId=1,currentPeer="",currentIsGroup=false,viewingProfile="",searchTimeout,onlineCount=0,contextMsgId=null,typingTimeout=null,typingSent=false,replyToId=null,replyToText=null,replyToNick=null,typingUsers={},lastMsgs={},lastTimes={},unreadCounts={},searchResults=[],currentSearchIdx=-1,currentPinnedId=null;
var originalTitle=document.title,newMsgCount=0,isLoadingMessages=false,allMessagesLoaded=false,oldestMessageId=null,lastDateShown="",reactionMsgId=null;
var selectedGiftId=null,sellGiftId=null;

function getToken(){return localStorage.getItem('token')}
function escapeHtml(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
function getInitials(n){if(!n||n.length===0)return'??';var c=n.replace(/[^a-zA-Zа-яА-ЯёЁ0-9]/g,'');if(c.length===0)c=n.substring(0,2);return c.substring(0,2).toUpperCase()}
function formatTime(st){try{var p=st.split(':');if(p.length<2)return st;var h=parseInt(p[0]),m=parseInt(p[1]);return h.toString().padStart(2,'0')+':'+m.toString().padStart(2,'0')}catch(e){return st}}
function getDateLabel(timeStr){try{var p=timeStr.split(':');if(p.length<2)return'';var h=parseInt(p[0]),m=parseInt(p[1]),now=new Date(),msgDate=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()),yesterday=new Date(today.getTime()-86400000),msgDay=new Date(msgDate.getFullYear(),msgDate.getMonth(),msgDate.getDate());if(msgDay.getTime()===today.getTime())return'Сегодня';if(msgDay.getTime()===yesterday.getTime())return'Вчера';return msgDate.getDate().toString().padStart(2,'0')+' '+msgDate.toLocaleString('ru',{month:'long'})}catch(e){return''}}

function loadTheme(){if((localStorage.getItem('theme')||'light')==='dark'){document.body.classList.add('dark');document.getElementById('menuThemeToggle').checked=true}}
function toggleTheme(){var d=document.getElementById('menuThemeToggle').checked;document.body.classList.toggle('dark',d);localStorage.setItem('theme',d?'dark':'light')}
function loadThemeCustom(){
    var t=localStorage.getItem('custom_theme');
    if(t) applyThemeFromSaved(JSON.parse(t));
    var bg=localStorage.getItem('custom_chat_bg');
    var img=localStorage.getItem('custom_wallpaper_img');
    if(img){
        document.documentElement.style.setProperty('--chat-bg-image','url('+img+')');
        document.documentElement.style.setProperty('--chat-bg-color','transparent');
    } else if(bg){
        document.documentElement.style.setProperty('--chat-bg-color',bg);
        document.documentElement.style.setProperty('--chat-bg-image','none');
    }
}
function applyThemeFromSaved(t){
    var r=document.documentElement.style;
    r.setProperty('--bg',t.bg);r.setProperty('--sidebar-bg',t.sidebar);r.setProperty('--main-bg',t.main);
    r.setProperty('--messages-bg',t.msgBg);r.setProperty('--input-bg',t.input);r.setProperty('--msg-other-bg',t.other);
    r.setProperty('--text',t.text);r.setProperty('--text-light',t.light);r.setProperty('--border',t.border);
    r.setProperty('--hover',t.hover);r.setProperty('--active',t.active);r.setProperty('--shadow',t.shadow);
    var img=localStorage.getItem('custom_wallpaper_img');
    if(!img){
        r.setProperty('--chat-bg-color',t.chatBg);
        r.setProperty('--chat-bg-image','none');
    }
    if(t.headerBg)r.setProperty('--header-bg',t.headerBg);
}

function openMenu(){document.getElementById('menuNickname').textContent=nickname||'Пользователь';document.getElementById('menuUsername').textContent='@'+(username||'user');if(myAvatar){document.getElementById('menuAvatarImg').src=myAvatar;document.getElementById('menuAvatarImg').style.display='block';document.getElementById('menuAvatarPlaceholder').style.display='none'}else{document.getElementById('menuAvatarImg').style.display='none';document.getElementById('menuAvatarPlaceholder').style.display='flex';document.getElementById('menuAvatarPlaceholder').textContent=getInitials(nickname)}document.getElementById('menuOverlay').classList.add('show')}
function closeMenu(){document.getElementById('menuOverlay').classList.remove('show')}
document.getElementById('hamburgerBtn').onclick=function(e){e.stopPropagation();openMenu()};document.getElementById('menuThemeToggle').onchange=toggleTheme;
document.onclick=function(e){var sr=document.getElementById('searchResults'),si=document.getElementById('searchInput');if(!sr.contains(e.target)&&e.target!==si)sr.classList.remove('show');document.getElementById('contextMenu').classList.remove('show');document.getElementById('reactionPicker').classList.remove('show');document.getElementById('chatMenuDropdown').classList.remove('show')};
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}
if(window.innerWidth<=768)setTimeout(function(){openSidebar()},300);
var touchStartX=0;document.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX});document.addEventListener('touchend',function(e){var d=e.changedTouches[0].clientX-touchStartX;if(d>80&&touchStartX<30)openSidebar();if(d<-80&&document.getElementById('sidebar').classList.contains('open'))closeSidebar()});

document.getElementById('searchInput').oninput=function(){clearTimeout(searchTimeout);var q=this.value.trim(),rd=document.getElementById('searchResults');if(q.length<1){rd.classList.remove('show');return}searchTimeout=setTimeout(async function(){try{var r=await fetch('/api/search?q='+encodeURIComponent(q));var data=await r.json();rd.innerHTML='';if(data.success){if(data.users)data.users.forEach(function(u){var d=document.createElement('div');d.className='search-result-item';d.innerHTML=(u.avatar?'<img class="chat-avatar" src="'+u.avatar+'">':'<div class="chat-avatar-placeholder">'+getInitials(u.nickname)+'</div>')+'<span><b>'+u.nickname+'</b> <span style="color:var(--text-light);">@'+u.username+'</span></span>';d.onclick=function(){rd.classList.remove('show');document.getElementById('searchInput').value='';openProfile(u.username)};rd.appendChild(d)});if(data.groups)data.groups.forEach(function(g){var d=document.createElement('div');d.className='search-result-item';d.innerHTML='<div class="chat-avatar-placeholder">'+getInitials(g.name)+'</div><span><b>'+g.name+'</b> <span style="color:var(--text-light);">👥</span></span>';d.onclick=function(){rd.classList.remove('show');document.getElementById('searchInput').value='';switchToChat(g.id,g.name,true)};rd.appendChild(d)})}rd.classList.add('show')}catch(e){}},300)};
function openMsgSearch(){document.getElementById('msgSearchBar').classList.add('show');document.getElementById('msgSearchInput').focus()}
function closeMsgSearch(){document.getElementById('msgSearchBar').classList.remove('show');document.getElementById('msgSearchInput').value='';clearHighlights()}
function searchInMessages(){var q=document.getElementById('msgSearchInput').value.trim();clearHighlights();searchResults=[];currentSearchIdx=-1;if(!q){document.getElementById('msgSearchCount').textContent='';return}var msgs=document.querySelectorAll('.message');msgs.forEach(function(m){var text=m.querySelector('.message-bubble')?.textContent||'';if(text.toLowerCase().includes(q.toLowerCase())){searchResults.push(m);highlightText(m,q)}});document.getElementById('msgSearchCount').textContent=searchResults.length+' совпадений';if(searchResults.length>0)nextSearchResult()}
function highlightText(el,q){var bubble=el.querySelector('.message-bubble');if(!bubble)return;var html=bubble.innerHTML,regex=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');bubble.innerHTML=html.replace(regex,'<span class="msg-highlight">$1</span>')}
function clearHighlights(){document.querySelectorAll('.msg-highlight').forEach(function(s){var p=s.parentNode;p.replaceChild(document.createTextNode(s.textContent),s);p.normalize()});searchResults=[];currentSearchIdx=-1}
function nextSearchResult(){if(searchResults.length===0)return;currentSearchIdx=(currentSearchIdx+1)%searchResults.length;searchResults[currentSearchIdx].scrollIntoView({behavior:'smooth',block:'center'})}
function prevSearchResult(){if(searchResults.length===0)return;currentSearchIdx=(currentSearchIdx-1+searchResults.length)%searchResults.length;searchResults[currentSearchIdx].scrollIntoView({behavior:'smooth',block:'center'})}
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();openMsgSearch()}if(e.key==='Escape'){cancelReply();closeMsgSearch();closeLightbox();document.getElementById('reactionPicker').classList.remove('show');document.getElementById('chatMenuDropdown').classList.remove('show')}});

// Закреп через API
async function pinMessage(id) {
    if (currentChatId === 1) { alert('Нельзя закреплять в общем чате'); return; }
    var text = document.querySelector('[data-msg-id="'+id+'"] .message-bubble')?.textContent || '';
    await fetch('/api/pin', {method:'POST', headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'}, body:JSON.stringify({chat_id:currentChatId, message_id:id, text:text.substring(0,80)})});
    loadPinned();
}
async function unpinMessage() {
    await fetch('/api/unpin', {method:'POST', headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'}, body:JSON.stringify({chat_id:currentChatId})});
    currentPinnedId = null;
    document.getElementById('pinnedBar').classList.remove('show');
}
async function loadPinned() {
    var r = await fetch('/api/pinned?chat_id='+currentChatId, {headers:{'Authorization':'Bearer '+getToken()}});
    var pinned = await r.json();
    if (pinned.length > 0) {
        currentPinnedId = pinned[0].id;
        document.getElementById('pinnedText').textContent = pinned[0].text;
        document.getElementById('pinnedBar').classList.add('show');
    } else {
        unpinMessage();
    }
}

function checkScrollBottom(){var area=document.getElementById('messagesArea'),btn=document.getElementById('scrollBottomBtn');if(!area||!btn)return;if(area.scrollHeight-area.scrollTop-area.clientHeight>100){btn.classList.add('show')}else{btn.classList.remove('show')}}
function scrollToBottom(){var area=document.getElementById('messagesArea');area.scrollTo({top:area.scrollHeight,behavior:'smooth'})}

async function openProfile(u){
    if(!u) return;
    viewingProfile=u;var isMe=(u===username);
    try{
        var r=await fetch('/api/profile?username='+u);
        if(!r.ok)return;
        var user=await r.json();
        document.getElementById('profileNickname').value=user.nickname||'';
        document.getElementById('profileUsername').value=user.username||'';
        document.getElementById('profileAbout').value=user.about||'';
        var img=document.getElementById('profileAvatarImg'),ph=document.getElementById('profileAvatarPlaceholder');
        if(user.avatar){img.src=user.avatar;img.style.display='block';ph.style.display='none'}else{img.style.display='none';ph.style.display='flex';ph.textContent=getInitials(user.nickname)}

            document.getElementById('profileBalance').value=user.balance;
            balField.style.display='block';
        } else { balField.style.display='none'; }
        document.getElementById('profileSaveBtn').style.display=isMe?'block':'none';
        document.getElementById('profileChatBtn').style.display=isMe?'none':'block';
        document.getElementById('profileBlockBtn').style.display=isMe?'none':'block';
        document.getElementById('profileDeleteChatBtn').style.display=isMe?'none':'block';

        document.getElementById('profileAbout').disabled=!isMe;
        document.getElementById('profileModal').classList.add('show');
        // Загружаем подарки пользователя
        loadUserGifts(u);
    }catch(e){}
}

async function loadUserGifts(u) {
    var section = document.getElementById('profileGiftsSection');
    var list = document.getElementById('profileGiftsList');
    try {
        var r = await fetch('/api/user-gifts?username=' + u, {headers:{'Authorization':'Bearer '+getToken()}});
        var gifts = await r.json();
        if (gifts.length > 0) {
            section.style.display = 'block';
            list.innerHTML = '';
            gifts.forEach(function(g) {
                var card = document.createElement('div');
                card.className = 'my-gift-card';
                var isOwner = (u === username);
                card.innerHTML = '<div class="gift-emoji">'+g.gift_emoji+'</div><div class="gift-info"><div class="gift-name">'+g.gift_name+'</div><div class="gift-from">от @'+g.from_user+'</div>'+(g.comment?'<div class="gift-comment">'+escapeHtml(g.comment)+'</div>':'')+'</div>'+(isOwner?'<button class="btn-sell" onclick="sellGift('+g.id+','+Math.floor(g.gift_price*0.9)+')">Продать за '+Math.floor(g.gift_price*0.9)+'👑</button>':'');
                list.appendChild(card);
            });
        } else {
            section.style.display = 'none';
        }
    } catch(e) {}
}

async function uploadFile(){
    var f=document.getElementById('fileInput').files[0];
    if(!f)return;
    var isPhoto=f.type.startsWith('image/'),isVideo=f.type.startsWith('video/'),isAudio=f.type.startsWith('audio/');

    try{
        var r=await fetch('/api/upload-file',{method:'POST',headers:{'Authorization':'Bearer '+getToken()},body:fd});
        var d=await r.json();
        if(d.file_url){
            if(ws&&ws.readyState===WebSocket.OPEN){
                ws.send(JSON.stringify({
                    text:'',chat_id:currentChatId,file_url:d.file_url,file_type:d.file_type,
                    reply_to:replyToId||0,reply_text:replyToText||'',reply_nick:replyToNick||'',

async function loadReactions(msgId){
    if(!msgId || msgId===0) return;
    var el=document.querySelector('[data-msg-id="'+msgId+'"]');
    if(!el)return;
    var bar=el.querySelector('.reactions-bar');
    if(!bar){bar=document.createElement('div');bar.className='reactions-bar';el.querySelector('.message-bubble').appendChild(bar);}
    try{
        var r=await fetch('/api/reactions?message_id='+msgId,{
            headers:{'Authorization':'Bearer '+getToken()}
        });
        if(!r.ok) return;
        var reactions=await r.json();
        var counts={};
        var userReactions = {};
        reactions.forEach(function(r){
            counts[r.emoji]=(counts[r.emoji]||0)+1;
            if(r.mine) userReactions[r.emoji] = true;
        });
        bar.innerHTML='';
        for(var emoji in counts){
            var badge=document.createElement('span');
            badge.className='reaction-badge';
            if(userReactions[emoji]) badge.classList.add('active');
            badge.textContent=emoji+' '+counts[emoji];
            badge.onclick=function(e){e.stopPropagation();addReaction(emoji);};
            bar.appendChild(badge);
        }
    }catch(e){}
}

function addChatToList(id,peer,isGroup){var existing=document.querySelector('.chat-item[data-chat-id="'+id+'"]');if(existing){var last=lastMsgs[id]||'',lastTime=lastTimes[id]||'',unread=unreadCounts[id]||0,badge=existing.querySelector('.chat-badge'),lastMsg=existing.querySelector('.chat-last-msg'),timeEl=existing.querySelector('.chat-time');if(badge){if(unread>0){badge.textContent=unread>99?'99+':unread;badge.style.display=''}else{badge.style.display='none'}}if(lastMsg)lastMsg.textContent=last;if(timeEl)timeEl.textContent=lastTime||'';return}var list=document.getElementById('chatList'),div=document.createElement('div');div.className='chat-item';div.setAttribute('data-chat-id',id);div.setAttribute('data-peer',peer||'');div.setAttribute('data-is-group',isGroup?'true':'false');var av=isGroup?getInitials(peer):(peer?getInitials(peer):'💬'),last=lastMsgs[id]||'',lastTime=lastTimes[id]||'',unread=unreadCounts[id]||0;div.innerHTML='<div class="chat-avatar-placeholder">'+av+'</div><div class="chat-info"><div class="chat-info-top"><div class="chat-name'+(unread>0?' unread':'')+'">'+(peer||'Общий чат')+'</div><div class="chat-time">'+lastTime+'</div></div>'+(last?'<div class="chat-last-msg">'+last+'</div>':'')+'</div>'+(unread>0?'<div class="chat-badge">'+(unread>99?'99+':unread)+'</div>':'');div.onclick=function(){unreadCounts[id]=0;switchToChat(id,peer,isGroup)};list.appendChild(div)}
function switchToChat(id,peer,isGroup){
    currentChatId=parseInt(id);currentPeer=peer||'';currentIsGroup=isGroup||false;
    unreadCounts[currentChatId]=0;
    document.getElementById('chatTitle').textContent=peer||'Общий чат';
    document.getElementById('chatHeaderIcon').textContent=peer?getInitials(peer):'💬';
    document.querySelectorAll('.chat-item').forEach(function(el){el.classList.remove('active')});
    var item=document.querySelector('.chat-item[data-chat-id="'+id+'"]');
    if(item)item.classList.add('active');
    var badge=item?item.querySelector('.chat-badge'):null;
    if(badge)badge.style.display='none';
    updateOnlineStatus();cancelReply();typingUsers={};updateTypingIndicator();closeMsgSearch();unpinMessage();loadPinned();
    if(!currentIsGroup&&currentChatId!==1)markAsRead(currentChatId);
    allMessagesLoaded=false;oldestMessageId=null;lastDateShown="";
    var menuBtn=document.getElementById('chatMenuBtn');
    if(!currentIsGroup&&currentChatId!==1) menuBtn.style.display='flex';
    else menuBtn.style.display='none';
    loadMessages(currentChatId,null);
}
async function loadMessages(chatId,beforeId){if(isLoadingMessages)return;isLoadingMessages=true;var url='/api/messages?chat_id='+chatId+'&limit=50';if(beforeId)url+='&before='+beforeId;try{var r=await fetch(url,{headers:{'Authorization':'Bearer '+getToken()}}),msgs=await r.json(),area=document.getElementById('messagesArea');if(!msgs||msgs.length===0){if(!beforeId)area.innerHTML='<div style="text-align:center;color:var(--text-light);padding:40px;">👑<br>Нет сообщений</div>';allMessagesLoaded=true;isLoadingMessages=false;return}if(msgs.length<50)allMessagesLoaded=true;if(beforeId){var oldScrollHeight=area.scrollHeight;msgs.sort(function(a,b){return a.id-b.id});var tempDiv=document.createElement('div');msgs.forEach(function(m){appendMessageToDiv(tempDiv,m)});while(tempDiv.firstChild)area.insertBefore(tempDiv.firstChild,area.firstChild);area.scrollTop=area.scrollHeight-oldScrollHeight}else{area.innerHTML='';lastDateShown="";msgs.sort(function(a,b){return a.id-b.id});msgs.forEach(function(m){appendMessageToDiv(area,m)});area.scrollTop=area.scrollHeight}if(msgs.length>0)oldestMessageId=msgs[0].id}catch(e){if(!beforeId)area.innerHTML='<div style="text-align:center;color:var(--text-light);padding:40px;">Ошибка загрузки</div>'}isLoadingMessages=false}

function appendMessageToDiv(parent,m){
    if(m.type==='message_updated'){var el=document.querySelector('[data-msg-id="'+m.id+'"]');if(el){var bubble=el.querySelector('.message-bubble');if(bubble){bubble.innerHTML=bubble.innerHTML.replace(/<div class="message-time.*$/,'')+'<div class="message-time">'+formatTime(m.time||'')+'</div>';if(m.text) bubble.innerHTML=bubble.innerHTML.replace(/(.*)<div class="message-time/,escapeHtml(m.text)+' <span class="message-edited">(ред.)</span><div class="message-time');}}return}
    if(m.type==='message_deleted'){var el=document.querySelector('[data-msg-id="'+m.id+'"]');if(el) el.remove();return}

    var dateLabel=getDateLabel(m.time);
    if(dateLabel&&dateLabel!==lastDateShown){var dateDiv=document.createElement('div');dateDiv.className='date-divider';dateDiv.textContent=dateLabel;document.getElementById('messagesArea').appendChild(dateDiv);lastDateShown=dateLabel}
    var div=document.createElement('div'),isMine=m.username===username;
    div.className='message '+(isMine?'mine':'other');div.setAttribute('data-msg-id',m.id);
    var avHtml='';if(!isMine){if(m.avatar&&m.avatar!==''){avHtml='<img class="message-avatar" src="'+m.avatar+'" onclick="openProfile(\''+m.username+'\')">'}else{avHtml='<div class="message-avatar-placeholder" onclick="openProfile(\''+m.username+'\')">'+getInitials(m.nickname||m.username)+'</div>'}}
    var readHtml='';if(currentIsGroup){readHtml='<div class="message-read">✓'+(m.read?'✓':'')+'</div>'}else if(isMine&&currentChatId!==1){readHtml='<div class="message-read">'+(m.read?'✓✓':'✓')+'</div>'}
    var editedHtml=m.edited?' <span class="message-edited">(ред.)</span>':'',displayTime=formatTime(m.time);
    var replyHtml='';if(m.reply_to&&m.reply_text){replyHtml='<div class="reply-preview" onclick="scrollToMessage('+m.reply_to+')"><b>'+escapeHtml(m.reply_nick||'')+'</b>: '+escapeHtml(m.reply_text)+' <span style="font-size:9px;opacity:0.5;">'+displayTime+'</span></div>'}
    var contentHtml='';
    if(m.file_url){
        var fileType=m.file_type||'';
        if(fileType==='photo'){
            contentHtml='<img src="'+m.file_url+'" onclick="openLightbox(\''+m.file_url+'\',\'photo\')" style="max-width:100%;max-height:300px;border-radius:8px;cursor:pointer;display:block;" loading="lazy">';
        } else if(fileType==='video'){
            contentHtml='<video controls preload="none" src="'+m.file_url+'" style="max-width:100%;max-height:300px;border-radius:8px;display:block;cursor:pointer;"></video>';
        } else if(fileType==='audio'){
            contentHtml='<audio controls preload="none" src="'+m.file_url+'" style="max-width:240px;display:block;"></audio>';
        } else {
            var fileName=m.file_name||'Файл',fileSize=m.file_size||0;
            contentHtml='<div class="file-card" onclick="window.open(\''+m.file_url+'\',\'_blank\')"><div class="file-card-icon">📄</div><div class="file-card-info"><div class="file-card-name">'+escapeHtml(fileName)+'</div><div class="file-card-size">'+formatFileSize(fileSize)+'</div></div></div>';
        }
    }
    if(m.text){var textWithMentions=escapeHtml(m.text).replace(/@(\w+)/g,'<span class="mention-highlight">@$1</span>');contentHtml+=textWithMentions}
    div.innerHTML=avHtml+'<div class="message-bubble">'+replyHtml+(isMine?'':'<div class="message-username" onclick="openProfile(\''+m.username+'\')">'+escapeHtml(m.nickname||m.username)+'</div>')+contentHtml+editedHtml+'<div class="message-time">'+displayTime+'</div>'+readHtml+'<div class="reactions-bar"></div></div>';
    div.oncontextmenu=function(e){e.preventDefault();var nn=this.querySelector('.message-username');showContextMenu(e,m.id,m.text,nn?nn.textContent:'',isMine)};
    var longPressTimer;div.addEventListener('touchstart',function(e){var self=this;longPressTimer=setTimeout(function(){showReactionPicker(e,m.id)},500)});div.addEventListener('touchend',function(){clearTimeout(longPressTimer)});div.addEventListener('touchmove',function(){clearTimeout(longPressTimer)});
    document.getElementById('messagesArea').appendChild(div);
    lastMsgs[currentChatId]=(m.nickname||m.username)+': '+(m.text||'[файл]');lastTimes[currentChatId]=formatTime(m.time);
    if(currentChatId!==parseInt((document.querySelector('.chat-item.active')||{}).getAttribute?.('data-chat-id')||0)){unreadCounts[currentChatId]=(unreadCounts[currentChatId]||0)+1}
    loadReactions(m.id);
}
function appendMessage(id,sender,senderNick,text,time,avatar,read,edited,animate,fileUrl,fileType,replyTo,replyText,replyNick){var m={id:id,username:sender,nickname:senderNick,text:text,time:time,avatar:avatar,read:read,edited:edited,file_url:fileUrl,file_type:fileType,reply_to:replyTo,reply_text:replyText,reply_nick:replyNick},div=document.createElement('div');appendMessageToDiv(div,m);var area=document.getElementById('messagesArea');area.appendChild(div);if(animate!==false)area.scrollTop=area.scrollHeight;checkScrollBottom()}
function updateOnlineStatus(){var s=document.getElementById('onlineStatus');if(currentChatId===1||currentIsGroup||!currentPeer){s.textContent=onlineCount+' участников онлайн';return}fetch('/api/lastseen?username='+currentPeer).then(function(r){return r.json()}).then(function(d){if(d.online){s.textContent='🟢 Онлайн'}else if(d.last_seen){var lastSeen=new Date(d.last_seen+'Z'),now=new Date(),diffMs=now-lastSeen,diffMin=Math.floor(diffMs/60000),diffHours=Math.floor(diffMs/3600000),diffDays=Math.floor(diffMs/86400000);if(diffMin<1){s.textContent='⚫ Был(а) только что'}else if(diffMin<60){s.textContent='⚫ Был(а) '+diffMin+' мин. назад'}else if(diffHours<24){s.textContent='⚫ Был(а) '+diffHours+' ч. назад'}else if(diffDays<7){s.textContent='⚫ Был(а) '+diffDays+' дн. назад'}else{var dd=lastSeen.getDate().toString().padStart(2,'0'),mm=(lastSeen.getMonth()+1).toString().padStart(2,'0'),yy=lastSeen.getFullYear().toString().slice(2),hh=lastSeen.getHours().toString().padStart(2,'0'),min=lastSeen.getMinutes().toString().padStart(2,'0');s.textContent='⚫ Был(а) '+dd+'.'+mm+'.'+yy+' в '+hh+':'+min}}else{s.textContent='⚫ Офлайн'}}).catch(function(){s.textContent=''})}
function markAsRead(chatId){fetch('/api/read',{method:'POST',headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'},body:JSON.stringify({chat_id:chatId})}).catch(function(){})}
function scrollToMessage(msgId){var el=document.querySelector('[data-msg-id="'+msgId+'"]');if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='var(--hover)';setTimeout(function(){el.style.background=''},2000)}}

function loadUser(){var code=new URLSearchParams(window.location.search).get('code');if(code){fetch('/api/group/join',{method:'POST',headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'},body:JSON.stringify({code:code})}).then(function(r){return r.json()}).then(function(d){if(d.group_id){alert('Вы в группе «'+d.name+'»!');window.history.replaceState({},'','/chat')}})}var token=getToken();if(!token){window.location.href='/';return}var user=JSON.parse(localStorage.getItem('user')||'{}');username=user.username||'';nickname=user.nickname||'';myAvatar=user.avatar||'';if(!username){window.location.href='/';return}loadChatList();switchToChat(1,'',false);connectWebSocket(token)}
async function loadChatList(){document.getElementById('chatList').innerHTML='';addChatToList(1,'',false);try{var r=await fetch('/api/chat/list',{headers:{'Authorization':'Bearer '+getToken()}}),chats=await r.json();chats.forEach(function(c){if(c.chat_id!==1)addChatToList(c.chat_id,c.peer,c.is_group||false)})}catch(e){}}

function connectWebSocket(token){var p=location.protocol==='https:'?'wss:':'ws:';ws=new WebSocket(p+'//'+location.host+'/ws?token='+token);var reconnectDelay=1000,maxReconnectDelay=30000;ws.onopen=function(){console.log('🔌 WebSocket подключён');reconnectDelay=1000};ws.onmessage=function(e){var msg=JSON.parse(e.data);
    if(msg.type==='chat_created'){
        if(msg.is_group) {
            // Добавляем группу в список (если ещё нет)
            addChatToList(msg.chat_id, msg.peer, true);
            // Переключаемся на группу
            currentChatId = msg.chat_id;
            currentPeer = msg.peer;
            currentIsGroup = true;
            switchToChat(msg.chat_id, msg.peer, true);
        } else {
            addChatToList(msg.chat_id, msg.peer, false);
        }
        return;
    }
    if(msg.type==='online_count'){onlineCount=parseInt(msg.text)||0;updateOnlineStatus();return}
    if(msg.type==='action'){showActionStatus(msg);return}
    if(msg.type==='typing_clear'){if(typingUsers[msg.chat_id])delete typingUsers[msg.chat_id][msg.username];updateTypingIndicator();return}
    if(msg.type==='reaction_update'){loadReactions(msg.id);return}
    if(msg.type==='message_updated'){appendMessageToDiv(null,msg);return}
    if(msg.type==='message_deleted'){appendMessageToDiv(null,msg);return}
    var t=msg.chat_id||1;
    if(t===currentChatId){
        removeTypingIndicator();
        var m={id:msg.id,username:msg.username,nickname:msg.nickname||msg.username,text:msg.text,time:msg.time,avatar:msg.avatar||'',read:msg.read||false,edited:msg.edited||false,file_url:msg.file_url,file_type:msg.file_type,reply_to:msg.reply_to,reply_text:msg.reply_text,reply_nick:msg.reply_nick,file_name:msg.file_name,file_size:msg.file_size},div=document.createElement('div');
        appendMessageToDiv(div,m);
        var area=document.getElementById('messagesArea');area.appendChild(div);area.scrollTop=area.scrollHeight;checkScrollBottom();
        if(!currentIsGroup&&currentChatId!==1)markAsRead(currentChatId);
    }else{
        lastMsgs[t]=msg.nickname+': '+(msg.text||'[файл]');
        if(t!==currentChatId){unreadCounts[t]=(unreadCounts[t]||0)+1;playNotificationSound();flashTitle();}
        addChatToList(t,msg.peer||msg.username||'',false);
    }};ws.onclose=function(){console.log('🔌 WebSocket отключён, переподключение через '+(reconnectDelay/1000)+'с');setTimeout(function(){connectWebSocket(token);reconnectDelay=Math.min(reconnectDelay*2,maxReconnectDelay)},reconnectDelay)}}
function sendMessage(){var input=document.getElementById('messageInput'),text=input.value.trim();if(!text&&!replyToId)return;if(ws&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({text:text,chat_id:currentChatId,reply_to:replyToId||0,reply_text:replyToText||'',reply_nick:replyToNick||''}));input.value='';cancelReply();typingSent=false;playSendSound()}}
function logout(){localStorage.removeItem('token');localStorage.removeItem('user');window.location.href='/'}
document.getElementById('chatHeader').onclick=function(e){
    if(e.target.closest('#chatMenuBtn') || e.target.closest('#chatMenuDropdown')) return;
    if(currentIsGroup) showGroupManage(currentChatId);
    else if(currentPeer) openProfile(currentPeer);
};

loadTheme();loadThemeCustom();window.addEventListener('load',function(){setTimeout(function(){loadUser()},200)});
</script>
